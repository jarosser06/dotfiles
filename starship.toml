"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_orange)\
$hostname\
[î‚°](fg:color_orange bg:color_yellow)\
$directory\
[î‚°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[î‚°](fg:color_aqua)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[battery]
full_symbol = "â€˘"
charging_symbol = "â‡ˇ"
discharging_symbol = "â‡Ł"
format = "[ $symbol]($style)"

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bg:color_orange fg:color_fg0"
format = "[ $hostname ]($style)"

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($staged$modified$ahead_behind$stashed )](fg:color_fg0 bg:color_aqua)]($style)'
staged = "+"
modified = "*"
conflicted = ""
untracked = ""
renamed = ""
deleted = ""
stashed = "â‰ˇ"

[character]
#success_symbol = '[Î»](bold fg:color_blue)'
#error_symbol = '[Î»](bold fg:color_red)'
success_symbol = '[î»¬](bold fg:color_blue)'
error_symbol = '[ó°»ť](bold fg:color_red)'

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
python_binary = 'python3'
